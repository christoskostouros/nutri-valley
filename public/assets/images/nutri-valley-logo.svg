<svg viewBox="0 0 220 46" xmlns="http://www.w3.org/2000/svg" width="220" height="46" fill="none">
  <!-- Circular globe/leaf emblem icon -->
  <g transform="translate(0, 0)">
    <!-- Outer circle -->
    <circle cx="23" cy="23" r="21.5" stroke="#474444" stroke-width="1.4" fill="none"/>

    <!-- Globe meridian lines -->
    <ellipse cx="23" cy="23" rx="21.5" ry="14" stroke="#474444" stroke-width="0.9" fill="none"/>
    <ellipse cx="23" cy="23" rx="21.5" ry="6" stroke="#474444" stroke-width="0.9" fill="none"/>

    <!-- Vertical meridian lines (longitude) -->
    <ellipse cx="23" cy="23" rx="10" ry="21.5" stroke="#474444" stroke-width="0.9" fill="none"/>
    <ellipse cx="23" cy="23" rx="4.5" ry="21.5" stroke="#474444" stroke-width="0.9" fill="none"/>

    <!-- Left wheat stalk -->
    <path d="M 5 23 C 3 18, 6 14, 9 17 C 7 20, 8 22, 5 23 Z" fill="#474444"/>
    <path d="M 5 23 C 3 28, 6 32, 9 29 C 7 26, 8 24, 5 23 Z" fill="#474444"/>

    <!-- Right wheat stalk -->
    <path d="M 41 23 C 43 18, 40 14, 37 17 C 39 20, 38 22, 41 23 Z" fill="#474444"/>
    <path d="M 41 23 C 43 28, 40 32, 37 29 C 39 26, 38 24, 41 23 Z" fill="#474444"/>
  </g>

  <!-- NUTRI VALLEY text -->
  <text
    x="54"
    y="30"
    font-family="'Montserrat', 'Arial Black', 'Arial', sans-serif"
    font-weight="800"
    font-size="19"
    fill="#474444"
    letter-spacing="1.5"
  >NUTRI VALLEY</text>
</svg>
